server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # ---- correct MIME types (KaTeX ships .woff2 / .woff / .ttf fonts) ----
    types {
        text/html                             html;
        text/css                              css;
        application/javascript                js;
        application/json                      json map;
        image/svg+xml                         svg;
        font/woff2                            woff2;
        font/woff                             woff;
        font/ttf                              ttf;
        application/vnd.ms-fontobject         eot;
    }
    default_type application/octet-stream;
    charset utf-8;

    # ---- compression (mermaid.min.js is ~3 MB; this matters on a tablet) --
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml font/ttf application/vnd.ms-fontobject;
    # note: .woff2/.woff are already compressed, so we don't gzip them.

    # ---- vendored libs & fonts NEVER change → safe to cache hard ----------
    #      (katex, highlight.js, mermaid, the .woff2/.woff/.ttf fonts)
    location ~* ^/assets/(katex|vendor)/ {
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    # ---- hand-written site code (app.js, styles.css, *-sim.js, ml-demos)  --
    #      changes whenever we edit the course. It is served at a NON-version
    #      URL, so it must be revalidated — otherwise a device that cached an
    #      older app.js keeps running it (no toggle / dead sidebar / bad links)
    #      until the 30-day immutable window expires. no-cache fixes that.
    location /assets/ {
        add_header Cache-Control "no-cache" always;
    }

    # ---- pages: always fresh so edits show up on reload --------------------
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ =404;
    }
}
