server {
    listen       80;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # ---- correct MIME types (KaTeX ships .woff2 / .woff / .ttf fonts) ----
    types {
        text/html                             html;
        text/css                              css;
        application/javascript                js;
        application/json                      json map;
        image/svg+xml                         svg;
        font/woff2                            woff2;
        font/woff                             woff;
        font/ttf                              ttf;
        application/vnd.ms-fontobject         eot;
    }
    default_type application/octet-stream;
    charset utf-8;

    # ---- compression (mermaid.min.js is ~3 MB; this matters on a tablet) --
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/javascript application/json image/svg+xml font/ttf application/vnd.ms-fontobject;
    # note: .woff2/.woff are already compressed, so we don't gzip them.

    # ---- caching: assets are versioned-by-content here, cache them hard ----
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ---- pages: always fresh so edits show up on reload --------------------
    location / {
        expires -1;
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ =404;
    }
}
