# Study — one-command LAN deployment of the unified offline site.
#
#   docker compose up -d        # build + serve in the background
#   docker compose down         # stop
#
# Then open http://<your-computer-LAN-IP>:8080 on the iPad (same Wi-Fi).
services:
  study:
    build: .
    image: study-site:latest
    container_name: study-site
    ports:
      - "8080:80"          # host 8080  ->  container 80   (change 8080 if busy)
    restart: unless-stopped
